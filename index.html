<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Training Jeopardy</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Merriweather:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1f4e;
  --navy2:#1a3a8f;
  --navy3:#2a4fbb;
  --gold:#f5c518;
  --gold2:#e6b800;
  --gold3:#fff0a0;
  --dark:#07090f;
  --surface:#111827;
  --surface2:#1a2035;
  --surface3:#232b42;
  --border:#2a3350;
  --text:#e8eaf0;
  --muted:#6b7a99;
  --success:#22c55e;
  --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:'Lato',sans-serif;
  background:var(--dark);
  color:var(--text);
  min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 20%, #0d1f4e22 0%, transparent 60%),
                   radial-gradient(ellipse at 80% 80%, #1a3a8f11 0%, transparent 60%);
}
#app{max-width:1020px;margin:0 auto;padding:24px 20px 80px}
.screen{display:none}.screen.active{display:block}

/* ── SETUP SCREEN ─────────────────────────────── */
.setup-hero{text-align:center;padding:32px 0 36px;position:relative}
.setup-hero::after{content:'';display:block;width:80px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px auto 0;border-radius:2px}
.setup-hero h1{
  font-family:'Merriweather',Georgia,serif;
  font-size:38px;font-weight:700;
  background:linear-gradient(135deg,#f5c518 0%,#ffe566 50%,#c9960a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.01em;line-height:1.15;
}
.setup-hero p{font-size:15px;color:var(--muted);margin-top:10px;letter-spacing:.02em}

.section-label{
  font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.14em;
  margin-bottom:10px;margin-top:22px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* Team cards */
.team-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;margin-bottom:10px;
  transition:border-color .2s;
}
.team-card:hover{border-color:#3a4a6a}
.t-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.t-row:last-child{margin-bottom:0}
.team-input{
  flex:1;border-radius:8px;border:1px solid var(--border);
  padding:9px 12px;font-size:14px;font-family:'Lato',sans-serif;
  background:#0d1120;color:var(--text);outline:none;transition:border-color .2s;
}
.team-input:focus{border-color:var(--gold)}
.color-dot{
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;flex-shrink:0;transition:all .15s;
}
.color-dot.sel{border-color:#fff;transform:scale(1.15)}
.rm-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:20px;padding:0 4px;line-height:1;transition:color .15s;
}
.rm-btn:hover{color:var(--danger)}
.add-team-btn{
  width:100%;padding:10px;border-radius:10px;
  border:1.5px dashed var(--border);background:transparent;
  color:var(--muted);font-size:13px;font-family:'Lato',sans-serif;
  cursor:pointer;transition:all .2s;margin-top:2px;margin-bottom:2px;
}
.add-team-btn:hover{border-color:#4a5a7a;color:var(--text);background:var(--surface2)}

/* Category grid */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:16px}
.cat-card{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:12px;padding:14px;cursor:pointer;
  transition:all .18s;user-select:none;position:relative;overflow:hidden;
}
.cat-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,transparent);
  transition:background .2s;border-radius:12px;
  z-index:0;pointer-events:none;
}
.cat-card>*{position:relative;z-index:1}
.cat-card:hover{border-color:#4a5a8a;transform:translateY(-1px);box-shadow:0 4px 16px #0005}
.cat-card:hover::before{background:linear-gradient(135deg,#1a3a8f18,transparent)}
.cat-card.sel{border-color:var(--gold);background:linear-gradient(135deg,#2a1f05,#1a1500)}
.cat-card.sel .cn{color:var(--gold)}
.cat-card.sel::after{
  content:'✓';position:absolute;top:8px;right:10px;
  font-size:12px;color:var(--gold);font-weight:700;
}
.ci{font-size:22px;margin-bottom:6px}
.cn{font-size:12px;font-weight:700;color:#c8cfe0;line-height:1.3;letter-spacing:.01em}

.sel-info{font-size:13px;color:var(--muted);margin-bottom:12px;text-align:center}
.sel-info strong{color:var(--text)}
.start-btn{
  width:100%;padding:15px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#f5c518,#e6a800);
  color:#0a0700;font-size:16px;font-weight:900;
  font-family:'Lato',sans-serif;cursor:pointer;
  letter-spacing:.04em;text-transform:uppercase;
  transition:all .2s;box-shadow:0 4px 20px #f5c51840;
  margin-top:6px;
}
.start-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 28px #f5c51860}
.start-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}

/* ── BOARD SCREEN ─────────────────────────────── */
.board-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;flex-wrap:wrap;gap:8px;
  padding:10px 14px;background:var(--surface2);
  border-radius:14px;border:1px solid var(--border);
}
.scoreboard{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.team-pill{
  border-radius:30px;padding:6px 14px;
  display:flex;align-items:center;gap:8px;
  border:1.5px solid;transition:all .3s;
}
.tp-name{font-size:11px;font-weight:700;letter-spacing:.05em}
.tp-score{font-size:18px;font-weight:900;font-family:'Merriweather',Georgia,serif}
.finish-btn{
  padding:8px 16px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:12px;font-family:'Lato',sans-serif;
  cursor:pointer;transition:all .2s;letter-spacing:.04em;
}
.finish-btn:hover{color:var(--text);border-color:#4a5a7a}

/* Board grid */
.jboard{display:grid;gap:5px}
.col-hdr{
  background:linear-gradient(180deg,#1e4db7,#1a3a8f);
  color:#c8d8ff;border-radius:10px;padding:10px 6px;
  text-align:center;font-size:10px;font-weight:700;
  line-height:1.3;min-height:58px;display:flex;
  align-items:center;justify-content:center;
  text-transform:uppercase;letter-spacing:.08em;
  border:1px solid #2a4fbb44;
  box-shadow:inset 0 1px 0 #ffffff18;
}
.cell{
  background:linear-gradient(180deg,#1e4db7,#1a3a8f);
  color:var(--gold);border-radius:10px;padding:6px 3px;
  text-align:center;font-size:22px;font-weight:900;
  cursor:pointer;min-height:56px;display:flex;
  align-items:center;justify-content:center;
  border:1px solid #2a4fbb44;
  transition:all .15s;font-family:'Merriweather',Georgia,serif;
  box-shadow:inset 0 1px 0 #ffffff18;
  position:relative;overflow:hidden;
}
.cell::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,#ffffff12,transparent 50%);
  border-radius:10px;
}
.cell:hover:not(.used){
  background:linear-gradient(180deg,#2a5fd4,#2248c0);
  border-color:var(--gold);
  transform:scale(1.03);
  box-shadow:0 4px 20px #f5c51830, inset 0 1px 0 #ffffff22;
  color:#ffe566;
}
.cell.used{
  background:var(--surface);color:var(--border);
  cursor:default;box-shadow:none;border-color:var(--border);
}
.cell.used::before{display:none}
.cell-check{font-size:18px;color:#2a3a55}

/* ── MODAL ────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.88);
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:20px;
  backdrop-filter:blur(4px);
}
.modal-overlay.hidden{display:none}
.modal-box{
  background:linear-gradient(160deg,#141a2e,#0f1525);
  border-radius:20px;
  border:1px solid #2a3a5a;
  max-width:660px;width:100%;
  padding:32px;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 80px #00000088;
}
.m-meta{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.m-cat-badge{
  font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.14em;
  background:var(--surface3);border:1px solid var(--border);
  padding:4px 10px;border-radius:20px;
}
.m-val-badge{
  font-size:13px;font-weight:900;color:var(--gold);
  font-family:'Merriweather',Georgia,serif;
  background:linear-gradient(135deg,#2a1f05,#1a1200);
  border:1px solid #f5c51840;
  padding:4px 12px;border-radius:20px;
}

.m-clue-box{
  background:linear-gradient(160deg,#1a3a8f,#1230700);
  background:linear-gradient(160deg,#1b3d96,#122870);
  border-radius:16px;padding:28px 24px;
  margin-bottom:24px;text-align:center;
  border:1px solid #2a4fbb66;
  box-shadow:inset 0 1px 0 #ffffff12;
}
.m-clue{
  font-size:19px;font-weight:400;color:#fff;
  line-height:1.6;font-family:'Merriweather',Georgia,serif;
  font-style:italic;
}

.ans-reveal{
  background:linear-gradient(160deg,#1a1200,#120d00);
  border-radius:14px;border:1px solid #f5c51830;
  padding:18px 20px;margin-bottom:20px;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ans-lbl{
  font-size:9px;font-weight:700;color:var(--gold);
  text-transform:uppercase;letter-spacing:.16em;margin-bottom:10px;
  opacity:.7;
}
.ans-txt{
  font-size:22px;font-weight:700;color:var(--gold);
  line-height:1.4;font-family:'Merriweather',Georgia,serif;
}

.modal-actions{display:flex;gap:8px;margin-top:4px}
.m-btn{
  flex:1;padding:12px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--muted);font-size:14px;font-family:'Lato',sans-serif;
  cursor:pointer;transition:all .18s;font-weight:600;
}
.m-btn:hover{color:var(--text);border-color:#4a5a7a;background:var(--surface3)}
.m-btn.primary{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0a0700;border-color:transparent;font-weight:900;
  letter-spacing:.03em;
}
.m-btn.primary:hover{background:linear-gradient(135deg,#ffe566,#f5c518);transform:translateY(-1px)}

.award-section-lbl{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:10px;margin-top:4px;
}
.team-award-grid{display:grid;gap:7px;margin-bottom:12px}
.award-btn{
  padding:12px 16px;border-radius:12px;
  border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:all .18s;
}
.award-btn:hover{border-color:var(--gold);background:linear-gradient(135deg,#2a1f05,#1a1500);transform:translateY(-1px)}
.award-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.award-name{font-size:14px;color:var(--text);font-weight:700;flex:1;text-align:left}
.award-score{font-size:13px;color:var(--muted);font-family:'Merriweather',Georgia,serif}

.wrong-btn{
  width:100%;padding:11px;border-radius:10px;
  border:1px solid #ef444430;background:#ef44440a;
  color:#f87171;font-size:13px;font-family:'Lato',sans-serif;
  cursor:pointer;margin-bottom:8px;transition:all .18s;font-weight:600;
}
.wrong-btn:hover{background:#ef44441a;border-color:#ef444460}
.skip-btn{
  width:100%;padding:11px;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:13px;font-family:'Lato',sans-serif;
  cursor:pointer;transition:all .18s;
}
.skip-btn:hover{color:var(--text);background:var(--surface2)}

/* ── RESULTS SCREEN ────────────────────────────── */
.results-hero{text-align:center;padding:28px 0 20px}
.results-hero h1{
  font-family:'Merriweather',Georgia,serif;
  font-size:32px;font-weight:700;color:var(--gold);
}
.results-hero p{font-size:14px;color:var(--muted);margin-top:8px}

.podium-wrap{
  display:flex;justify-content:center;align-items:flex-end;
  gap:8px;margin:24px 0;padding:0 16px 0;
}
.pod{text-align:center;flex:1;max-width:150px}
.pod-platform{
  border-radius:10px 10px 0 0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding:12px 8px 10px;
  position:relative;
  box-shadow:0 -2px 20px #00000044;
}
.pod-rank-num{
  font-size:28px;font-weight:900;color:rgba(255,255,255,.9);
  font-family:'Merriweather',Georgia,serif;line-height:1;margin-bottom:2px;
}
.pod-rank-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase}
.pod-name{
  font-size:13px;color:var(--text);margin-top:10px;
  font-weight:700;word-break:break-word;line-height:1.3;
}
.pod-score{font-size:14px;color:var(--muted);margin-top:4px;font-family:'Merriweather',Georgia,serif}

.results-list{display:grid;gap:8px;margin-top:16px}
.result-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;transition:border-color .2s;
}
.result-row:hover{border-color:#3a4a6a}
.result-rank{font-size:12px;color:var(--muted);font-weight:700;width:24px}
.result-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.result-name{flex:1;font-size:15px;color:var(--text);font-weight:700}
.result-score{font-size:16px;font-weight:900;font-family:'Merriweather',Georgia,serif}

.play-again{
  width:100%;padding:15px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0a0700;font-size:16px;font-weight:900;
  font-family:'Lato',sans-serif;cursor:pointer;
  letter-spacing:.04em;text-transform:uppercase;
  transition:all .2s;box-shadow:0 4px 20px #f5c51840;
  margin-top:20px;
}
.play-again:hover{transform:translateY(-1px);box-shadow:0 6px 28px #f5c51860}

/* Score change animation */
.score-bump{animation:bump .4s ease}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}

/* Confetti canvas */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:200}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="app">

<!-- SETUP -->
<div class="screen active" id="s-setup">
  <div class="setup-hero">
    <h1>Sales Training Jeopardy</h1>
    <p>Personal lines insurance — select 5 or 6 categories to build your board</p>
  </div>
  <div class="section-label">Teams</div>
  <div id="teams-list"></div>
  <button class="add-team-btn" onclick="addTeam()">+ Add a team</button>
  <div class="section-label">Categories</div>
  <div class="cat-grid" id="cat-grid"></div>
  <p class="sel-info" id="sel-info">Select 5 or 6 categories to start</p>
  <button class="start-btn" id="start-btn" disabled onclick="startGame()">Start game</button>
</div>

<!-- BOARD -->
<div class="screen" id="s-board">
  <div class="board-header">
    <div class="scoreboard" id="scoreboard"></div>
    <button class="finish-btn" onclick="endGame()">End game</button>
  </div>
  <div class="jboard" id="board"></div>
</div>

<!-- RESULTS -->
<div class="screen" id="s-results">
  <div class="results-hero">
    <h1>🏆 Final Results</h1>
    <p id="results-subtitle"></p>
  </div>
  <div class="podium-wrap" id="podium"></div>
  <div class="results-list" id="results-table"></div>
  <button class="play-again" onclick="playAgain()">Play again</button>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-box" id="modal-box"></div>
</div>

[100,"The person or entity named as the primary policyholder on a contract.","What is the named insured?"],
[200,"The front page of any policy, listing the insured, coverages, limits, and premium.","What is the declarations page?"],
[200,"A written change attached to a policy that adds, removes, or modifies coverage.","What is an endorsement, or rider?"],
[300,"This temporary document proves coverage is active before the full policy is issued.","What is a binder?"],
[300,"The person who sells the policy and is licensed to represent the insurer.","What is the agent, or producer?"],
[400,"This industry report shows a driver's accident and violation history.","What is an MVR?"],
[400,"The date a policy ends and must be renewed to keep coverage going.","What is the expiration, or renewal, date?"],
[500,"This database compiles a property's prior insurance claims across carriers.","What is the CLUE report?"],
[500,"The legal principle that an insurance application's statements are promises the coverage relies on.","What are warranties, or representations?"],
]},
};

const VALUES=[100,200,300,400,500];
let teams=[],selCats=[],gameData={},usedCells={},currentCell=null;

function init(){
  teams=[{name:'Team 1',color:COLORS[0],score:0},{name:'Team 2',color:COLORS[1],score:0}];
  selCats=[];renderTeams();renderCats();updateSelInfo();
}

function renderTeams(){
  const el=document.getElementById('teams-list');el.innerHTML='';
  teams.forEach((t,i)=>{
    const d=document.createElement('div');d.className='card';
    const dots=COLORS.map((c,ci)=>`<div class="color-dot${t.color===c?' sel':''}" style="background:${c}" onclick="setColor(${i},${ci})"></div>`).join('');
    d.innerHTML=`<div class="row"><input type="text" value="${t.name}" placeholder="Team name" oninput="setName(${i},this.value)"><button class="rm-btn" onclick="removeTeam(${i})">×</button></div><div class="row" style="flex-wrap:wrap;gap:6px">${dots}</div>`;
    el.appendChild(d);
  });
}

function addTeam(){
  if(teams.length>=6)return;
  const used=teams.map(t=>t.color);
  const c=COLORS.find(c=>!used.includes(c))||COLORS[teams.length%COLORS.length];
  teams.push({name:'Team '+(teams.length+1),color:c,score:0});
  renderTeams();checkReady();
}

function removeTeam(i){if(teams.length<=1)return;teams.splice(i,1);renderTeams();checkReady();}
function setName(i,v){teams[i].name=v||'Team '+(i+1);}
function setColor(i,ci){teams[i].color=COLORS[ci];renderTeams();}

function renderCats(){
  const g=document.getElementById('cat-grid');g.innerHTML='';
  Object.entries(BANKS).forEach(([name,data])=>{
    const c=document.createElement('div');
    c.className='cat-card'+(selCats.includes(name)?' sel':'');
    c.innerHTML=`<div class="ci">${data.icon}</div><div class="cn">${name}</div>`;
    c.onclick=()=>toggleCat(name,c);
    g.appendChild(c);
  });
}

function toggleCat(name,card){
  if(selCats.includes(name)){selCats=selCats.filter(c=>c!==name);card.classList.remove('sel');}
  else{
    if(selCats.length>=6){const f=document.querySelector('.cat-card.sel');if(f){selCats.shift();f.classList.remove('sel');}}
    selCats.push(name);card.classList.add('sel');
  }
  updateSelInfo();
}

function updateSelInfo(){
  const n=selCats.length;
  document.getElementById('sel-info').innerHTML=n<5?`Select ${5-n} more categor${5-n===1?'y':'ies'} to start`:`<strong>${n} categories selected</strong> — ready to play`;
  checkReady();
}

function checkReady(){document.getElementById('start-btn').disabled=selCats.length<5||teams.length<1;}

function startGame(){
  teams.forEach(t=>t.score=0);gameData={};
  const cats=selCats.slice(0,6);
  cats.forEach(cat=>{
    gameData[cat]={};
    // Group this category's questions by value, then pick ONE at random per tier
    VALUES.forEach(val=>{
      const pool=BANKS[cat].qs.filter(q=>q[0]===val);
      const pick=pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
      if(pick) gameData[cat][val]=[pick[1],pick[2]];
      else gameData[cat][val]=["(no question available)","—"];
    });
  });
  usedCells={};
  renderBoard(cats);renderScoreboard();showScreen('s-board');
}

function renderScoreboard(){
  document.getElementById('scoreboard').innerHTML=teams.map(t=>`<div class="team-score" style="background:${t.color}18;border:1px solid ${t.color}40"><div class="ts-name" style="color:${t.color}">${t.name}</div><div class="ts-val" style="color:${t.color}">${fmt(t.score)}</div></div>`).join('');
}

function fmt(s){return(s<0?'-$':'$')+Math.abs(s).toLocaleString();}

function renderBoard(cats){
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${cats.length},1fr)`;
  board.innerHTML='';
  cats.forEach(cat=>{const h=document.createElement('div');h.className='col-hdr';h.textContent=cat;board.appendChild(h);});
  VALUES.forEach(val=>{
    cats.forEach(cat=>{
      const key=`${cat}|${val}`;
      const cell=document.createElement('div');
      cell.className='cell'+(usedCells[key]?' used':'');
      cell.dataset.cat=cat;cell.dataset.val=val;
      cell.textContent=usedCells[key]?'✓':'$'+val;
      if(!usedCells[key])cell.onclick=()=>openQ(cat,val);
      board.appendChild(cell);
    });
  });
}

function openQ(cat,val){
  const key=`${cat}|${val}`;if(usedCells[key])return;
  currentCell={cat,val,key};
  const[clue]=gameData[cat][val];
  document.getElementById('modal-box').innerHTML=`
    <div class="m-cat">${cat}</div>
    <div class="m-val">$${val}</div>
    <div class="m-clue-box"><div class="m-clue">${clue}</div></div>
    <div class="modal-actions">
      <button class="m-btn" onclick="skipQ()">Skip</button>
      <button class="m-btn primary" onclick="showAnswer()">Reveal response</button>
    </div>`;
  document.getElementById('modal').classList.remove('hidden');
}

function showAnswer(){
  const{cat,val}=currentCell;
  const[clue,response]=gameData[cat][val];
  const btns=teams.map((t,i)=>`<button class="award-btn" onclick="awardTeam(${i})"><div class="award-dot" style="background:${t.color}"></div><span class="award-name">${t.name}</span><span class="award-score">${fmt(t.score)}</span></button>`).join('');
  document.getElementById('modal-box').innerHTML=`
    <div class="m-cat">${cat}</div>
    <div class="m-val">$${val}</div>
    <div class="m-clue-box"><div class="m-clue">${clue}</div></div>
    <div class="ans-box">
      <div class="ans-lbl">Correct response</div>
      <div class="ans-txt">${response}</div>
    </div>
    <div class="award-section-lbl">Award $${val} to the team that answered correctly:</div>
    <div class="team-award-grid">${btns}</div>
    <button class="wrong-btn" onclick="wrongQ()">Nobody got it — no points awarded</button>
    <button class="skip-btn" onclick="skipQ()">Skip</button>`;
}

function awardTeam(i){teams[i].score+=currentCell.val;markDone();}
function wrongQ(){markDone();}
function skipQ(){markDone();}

function markDone(){
  const{cat,val,key}=currentCell;
  usedCells[key]=true;
  document.getElementById('modal').classList.add('hidden');
  document.querySelectorAll('.cell').forEach(c=>{
    if(c.dataset.cat===cat&&parseInt(c.dataset.val)===val){c.className='cell used';c.textContent='✓';c.onclick=null;}
  });
  renderScoreboard();
  if(Object.keys(usedCells).length>=selCats.slice(0,6).length*VALUES.length)endGame();
}

function endGame(){
  document.getElementById('modal').classList.add('hidden');
  const sorted=[...teams].sort((a,b)=>b.score-a.score);
  const hts=[100,72,54,40,34,28];
  document.getElementById('podium').innerHTML=sorted.map((t,i)=>`<div class="pod"><div class="pod-bar" style="background:${t.color};height:${hts[i]||28}px"><span class="pod-rank">${['1st','2nd','3rd','4th','5th','6th'][i]}</span></div><div class="pod-name">${t.name}</div><div class="pod-pts">${fmt(t.score)}</div></div>`).join('');
  document.getElementById('results-table').innerHTML=`<div style="display:grid;gap:8px;margin-top:8px">${sorted.map(t=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#1a1d27;border:1px solid #2a2d3a;border-radius:10px"><div style="width:13px;height:13px;border-radius:50%;background:${t.color};flex-shrink:0"></div><span style="flex:1;font-size:14px;color:#e0e0e0">${t.name}</span><span style="font-size:16px;font-weight:700;color:${t.score<0?'#f87171':'#f5c518'};font-family:Georgia,serif">${fmt(t.score)}</span></div>`).join('')}</div>`;
  showScreen('s-results');
}

function playAgain(){
  teams.forEach(t=>t.score=0);selCats=[];
  renderTeams();renderCats();updateSelInfo();showScreen('s-setup');
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

init();


// ── AUDIO ENGINE ──────────────────────────────────────────────
let audioCtx = null;
function getCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, startTime, duration, gainVal, ctx){
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = type; o.frequency.setValueAtTime(freq, startTime);
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(gainVal, startTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  o.start(startTime); o.stop(startTime + duration + 0.05);
}

// Warm chime — cell selected
function playSelect(){
  const ctx = getCtx(); const t = ctx.currentTime;
  playTone(523.25,'sine',t,0.18,0.09,ctx);     // C5
  playTone(659.25,'sine',t+0.06,0.16,0.07,ctx); // E5
  playTone(783.99,'sine',t+0.12,0.22,0.06,ctx); // G5
}

// Positive award — bright ascending chime
function playCorrect(){
  const ctx = getCtx(); const t = ctx.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
    playTone(f,'sine',t+i*0.07,0.28-i*0.02,0.1-i*0.01,ctx);
  });
  // Subtle harmony
  playTone(392,'triangle',t,0.35,0.04,ctx);
}

// Soft neutral — nobody got it
function playWrong(){
  const ctx = getCtx(); const t = ctx.currentTime;
  playTone(311.13,'sine',t,0.15,0.07,ctx);   // Eb4 — gentle minor
  playTone(369.99,'sine',t+0.08,0.20,0.05,ctx); // F#4
  playTone(293.66,'sine',t+0.18,0.25,0.04,ctx); // D4
}

// Reveal — soft whoosh + low note
function playReveal(){
  const ctx = getCtx(); const t = ctx.currentTime;
  playTone(220,'sine',t,0.12,0.06,ctx);
  playTone(277.18,'sine',t+0.05,0.18,0.05,ctx);
  // Soft noise burst
  const buf = ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.04;
  const src = ctx.createBufferSource();
  const gn = ctx.createGain();
  src.buffer=buf; src.connect(gn); gn.connect(ctx.destination);
  gn.gain.setValueAtTime(0.3,t);
  gn.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
  src.start(t);
}

// Victory fanfare — end of game
function playFanfare(){
  const ctx = getCtx(); const t = ctx.currentTime;
  const melody = [523.25,659.25,783.99,659.25,783.99,1046.5];
  const timing = [0,0.12,0.24,0.38,0.50,0.62];
  melody.forEach((f,i)=>{
    playTone(f,'sine',t+timing[i],0.32,0.12,ctx);
    playTone(f*0.5,'triangle',t+timing[i],0.32,0.04,ctx);
  });
}

// ── CONFETTI ──────────────────────────────────────────────────
function launchConfetti(colors){
  const canvas = document.getElementById('confetti');
  const ctx2 = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = [];
  for(let i=0;i<160;i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: -10 - Math.random()*200,
      w: 8+Math.random()*6, h: 10+Math.random()*8,
      r: Math.random()*Math.PI*2,
      dr: (Math.random()-.5)*0.15,
      vx: (Math.random()-.5)*3,
      vy: 2+Math.random()*4,
      color: colors[Math.floor(Math.random()*colors.length)],
      alpha: 1
    });
  }
  let frame;
  function draw(){
    ctx2.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.r+=p.dr; p.vy+=0.06;
      if(p.y < canvas.height+20){ alive=true; }
      else { p.alpha -= 0.02; }
      if(p.alpha<=0) return;
      ctx2.save();
      ctx2.globalAlpha=Math.min(p.alpha,1);
      ctx2.translate(p.x,p.y); ctx2.rotate(p.r);
      ctx2.fillStyle=p.color;
      ctx2.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx2.restore();
    });
    if(alive) frame=requestAnimationFrame(draw);
    else ctx2.clearRect(0,0,canvas.width,canvas.height);
  }
  if(frame) cancelAnimationFrame(frame);
  draw();
}

// ── OVERRIDE KEY FUNCTIONS WITH AUDIO+VISUAL ─────────────────
const _origOpenQ = openQ;
// Patch openQ to play select sound
const _origOpenQInner = window.openQ;

// Patch awardTeam to play correct sound + bump score
const _baseAwardTeam = awardTeam;
window.awardTeam = function(i){
  playCorrect();
  teams[i].score += currentCell.val;
  // Animate score pill
  setTimeout(()=>{
    const pills = document.querySelectorAll('.team-pill');
    if(pills[i]) pills[i].classList.add('score-bump');
    setTimeout(()=>{ if(pills[i]) pills[i].classList.remove('score-bump'); }, 500);
  }, 50);
  markDone();
};

// Patch wrongQ
const _baseWrongQ = wrongQ;
window.wrongQ = function(){
  playWrong();
  markDone();
};

// Patch openQ for select sound
window.openQ = function(cat,val){
  playSelect();
  const key=`${cat}|${val}`;if(usedCells[key])return;
  currentCell={cat,val,key};
  const[clue]=gameData[cat][val];
  document.getElementById('modal-box').innerHTML=`
    <div class="m-meta">
      <span class="m-cat-badge">${cat}</span>
      <span class="m-val-badge">$${val}</span>

};

  playReveal();
  const{cat,val}=currentCell;
  const[clue,response]=gameData[cat][val];
  const btns=teams.map((t,i)=>`
    <button class="award-btn" onclick="awardTeam(${i})">
      <div class="award-dot" style="background:${t.color};box-shadow:0 0 8px ${t.color}88"></div>
      <span class="award-name">${t.name}</span>
      <span class="award-score">${fmt(t.score)}</span>
    </button>`).join('');
  document.getElementById('modal-box').innerHTML=`
    <div class="m-meta">
      <span class="m-cat-badge">${cat}</span>
      <span class="m-val-badge">$${val}</span>
    </div>
    <div class="m-clue-box"><div class="m-clue">${clue}</div></div>
    <div class="ans-reveal">
      <div class="ans-lbl">Correct response</div>
      <div class="ans-txt">${response}</div>
    </div>
    <div class="award-section-lbl">Award $${val} to:</div>
    <div class="team-award-grid">${btns}</div>
    <button class="wrong-btn" onclick="wrongQ()">Nobody got it</button>

};

// Patch cell used state
window.markDone = function(){
  const{cat,val,key}=currentCell;
  usedCells[key]=true;
  document.getElementById('modal').classList.add('hidden');
  document.querySelectorAll('.cell').forEach(c=>{
    if(c.dataset.cat===cat&&parseInt(c.dataset.val)===val){
      c.className='cell used';

    }
  });

// Patch endGame for fanfare + confetti + polished results
window.endGame = function(){
  document.getElementById('modal').classList.add('hidden');
  const sorted=[...teams].sort((a,b)=>b.score-a.score);
  playFanfare();
  setTimeout(()=>launchConfetti(teams.map(t=>t.color)),400);

  const medals=['🥇','🥈','🥉','4th','5th','6th'];

    <div class="pod">

        <div class="pod-rank-num">${medals[i]}</div>
      </div>
      <div class="pod-name">${t.name}</div>
      <div class="pod-score">${fmt(t.score)}</div>
    </div>`).join('');

  document.getElementById('results-subtitle').textContent=`${sorted[0].name} takes the win!`;

  document.getElementById('results-table').innerHTML=sorted.map((t,i)=>`
    <div class="result-row">
      <span class="result-rank">${i+1}</span>
      <div class="result-dot" style="background:${t.color};box-shadow:0 0 6px ${t.color}88"></div>

  showScreen('s-results');
};
