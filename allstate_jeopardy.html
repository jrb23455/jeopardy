<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allstate Jeopardy — Sales Training</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e8e8e8; min-height: 100vh; }

  #app { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* HOME */
  .home-header { text-align: center; padding: 24px 0 28px; }
  .home-header h1 { font-size: 32px; font-weight: 700; color: #f5c518; letter-spacing: -0.02em; font-family: Georgia, serif; }
  .home-header p { font-size: 15px; color: #999; margin-top: 6px; }
  .home-header .subtitle { font-size: 13px; color: #666; margin-top: 4px; }

  .section-label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }

  .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 20px; }
  .cat-card { background: #1a1d27; border: 1.5px solid #2a2d3a; border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; user-select: none; }
  .cat-card:hover { border-color: #3a4070; background: #1e2135; }
  .cat-card.selected { border-color: #f5c518; background: #1f1c0a; }
  .cat-card.selected .cat-name { color: #f5c518; }
  .cat-icon { font-size: 22px; margin-bottom: 7px; }
  .cat-name { font-size: 13px; font-weight: 600; color: #d0d0d0; line-height: 1.3; }
  .cat-count { font-size: 11px; color: #555; margin-top: 3px; }

  .selection-info { font-size: 14px; color: #888; margin-bottom: 12px; }
  .selection-info strong { color: #e0e0e0; }

  .start-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #f5c518; color: #0f0f0f; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .start-btn:hover { opacity: 0.9; }
  .start-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* BOARD */
  .board-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .score-display { font-size: 18px; font-weight: 700; color: #f5c518; font-family: Georgia, serif; }
  .board-btn { padding: 7px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1d27; color: #888; font-size: 13px; cursor: pointer; }
  .board-btn:hover { color: #ccc; border-color: #444; }

  .jeopardy-board { display: grid; gap: 4px; }
  .col-header { background: #1a3a8f; color: #fff; border-radius: 8px; padding: 10px 6px; text-align: center; font-size: 11px; font-weight: 600; line-height: 1.3; min-height: 56px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; letter-spacing: 0.04em; }
  .cell { background: #1a3a8f; color: #f5c518; border-radius: 8px; padding: 8px 4px; text-align: center; font-size: 20px; font-weight: 700; cursor: pointer; min-height: 56px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; border: 2px solid transparent; font-family: Georgia, serif; }
  .cell:hover:not(.used) { background: #2a50c0; border-color: #f5c518; transform: scale(1.02); }
  .cell.used { background: #12141a; color: #333; cursor: default; font-size: 20px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
  .modal-overlay.hidden { display: none; }
  .modal-box { background: #1a1d27; border-radius: 16px; border: 1px solid #2a2d3a; max-width: 580px; width: 100%; padding: 28px; }
  .modal-cat { font-size: 11px; font-weight: 700; color: #f5c518; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .modal-value { font-size: 36px; font-weight: 700; color: #f5c518; font-family: Georgia, serif; margin-bottom: 20px; }
  .modal-q { font-size: 20px; font-weight: 500; color: #e8e8e8; line-height: 1.5; margin-bottom: 24px; font-family: Georgia, serif; }
  .modal-actions { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #111318; color: #888; font-size: 14px; cursor: pointer; transition: all 0.15s; }
  .modal-btn:hover { color: #ccc; border-color: #444; }
  .modal-btn.show-ans { background: #f5c518; color: #0f0f0f; border-color: #f5c518; font-weight: 700; }
  .modal-btn.show-ans:hover { background: #e6b800; }

  .answer-box { background: #0f1117; border-radius: 10px; border: 1px solid #2a2d3a; padding: 16px; margin-bottom: 16px; }
  .answer-label { font-size: 10px; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em; }
  .answer-text { font-size: 16px; color: #e0e0e0; line-height: 1.5; font-family: Georgia, serif; }

  .judge-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .judge-btn { padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .judge-btn:hover { opacity: 0.85; }
  .judge-btn.correct { background: #1a4a2a; color: #4ade80; border: 1px solid #2d6b40; }
  .judge-btn.wrong { background: #4a1a1a; color: #f87171; border: 1px solid #6b2d2d; }

  /* RESULTS */
  .results-box { text-align: center; padding: 32px 0; }
  .results-score { font-size: 56px; font-weight: 700; color: #f5c518; margin: 12px 0 4px; font-family: Georgia, serif; }
  .results-label { font-size: 16px; color: #888; margin-bottom: 28px; }
  .results-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; margin-bottom: 28px; }
  .rb-card { background: #1a1d27; border-radius: 10px; padding: 14px 18px; border: 1px solid #2a2d3a; }
  .rb-num { font-size: 26px; font-weight: 700; color: #e0e0e0; font-family: Georgia, serif; }
  .rb-lbl { font-size: 12px; color: #555; margin-top: 2px; }
  .play-again-btn { width: 100%; max-width: 400px; padding: 14px; border-radius: 10px; border: none; background: #f5c518; color: #0f0f0f; font-size: 16px; font-weight: 700; cursor: pointer; }
  .play-again-btn:hover { opacity: 0.9; }

  /* Progress bar */
  .progress-bar { height: 3px; background: #1a2a5a; border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
  .progress-fill { height: 100%; background: #f5c518; border-radius: 3px; transition: width 0.3s; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <h1>Allstate Jeopardy</h1>
      <p>Personal Lines Sales Training</p>
      <div class="subtitle">Pick 5–6 categories, then hit the board</div>
    </div>
    <div class="section-label">Choose your categories</div>
    <div class="cat-grid" id="cat-grid"></div>
    <p class="selection-info" id="sel-info">Select 5 or 6 categories to start</p>
    <button class="start-btn" id="start-btn" disabled onclick="startGame()">Start game</button>
  </div>

  <!-- BOARD -->
  <div class="screen" id="screen-board">
    <div class="board-header">
      <div class="score-display" id="score-display">$0</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="progress-text" style="font-size:13px;color:#666;"></span>
        <button class="board-btn" onclick="endGame()">Finish game</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="jeopardy-board" id="board"></div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="screen-results">
    <div class="results-box">
      <div class="section-label" style="justify-content:center;display:flex;">Final score</div>
      <div class="results-score" id="final-score">$0</div>
      <div class="results-label" id="final-label"></div>
      <div class="results-breakdown">
        <div class="rb-card"><div class="rb-num" id="res-correct">0</div><div class="rb-lbl">Correct</div></div>
        <div class="rb-card"><div class="rb-num" id="res-wrong">0</div><div class="rb-lbl">Wrong / Partial</div></div>
        <div class="rb-card"><div class="rb-num" id="res-skipped">0</div><div class="rb-lbl">Skipped</div></div>
        <div class="rb-card"><div class="rb-num" id="res-pct">0%</div><div class="rb-lbl">Accuracy</div></div>
      </div>
      <button class="play-again-btn" onclick="playAgain()">Play again</button>
    </div>
  </div>

</div>

<!-- QUESTION MODAL -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <div class="modal-cat" id="m-cat"></div>
    <div class="modal-value" id="m-val"></div>
    <div class="modal-q" id="m-q"></div>
    <div id="m-answer-area"></div>
    <div class="modal-actions" id="m-actions">
      <button class="modal-btn" onclick="skipQ()">Skip</button>
      <button class="modal-btn show-ans" onclick="showAnswer()">Show answer</button>
    </div>
  </div>
</div>

function init() {

  });
  updateSelInfo();
}

function toggleCat(name, card) {
  if (selectedCats.includes(name)) {
    selectedCats = selectedCats.filter(c => c !== name);
    card.classList.remove('selected');
  } else {
    if (selectedCats.length >= MAX_CATS) {
      const cards = document.querySelectorAll('.cat-card.selected');
      const first = cards[0];
      const firstName = first.querySelector('.cat-name').textContent;
      selectedCats = selectedCats.filter(c => c !== firstName);
      first.classList.remove('selected');
    }
    selectedCats.push(name);
    card.classList.add('selected');
  }
  updateSelInfo();
}

function updateSelInfo() {
  const n = selectedCats.length;
  const info = document.getElementById('sel-info');
  const btn = document.getElementById('start-btn');
  if (n < MIN_CATS) {
    info.textContent = `Select ${MIN_CATS - n} more categor${MIN_CATS-n===1?'y':'ies'} to start`;
    btn.disabled = true;
  } else {
    info.innerHTML = `<strong>${n} categories selected</strong> — ready to play`;
    btn.disabled = false;
  }
}

function startGame() {
  const cats = selectedCats.slice(0, MAX_CATS);
  gameData = {};
  cats.forEach(cat => {
    const shuffled = [...BANKS[cat].qs].sort(() => Math.random() - 0.5);
    gameData[cat] = {};
    VALUES.forEach((v, i) => { gameData[cat][v] = shuffled[i] || shuffled[0]; });
  });
  usedCells = {};
  score = 0; correct = 0; wrong = 0; skipped = 0;
  totalCells = cats.length * VALUES.length;
  updateScoreDisplay();
  renderBoard(cats);
  showScreen('screen-board');
}

function updateScoreDisplay() {
  const el = document.getElementById('score-display');
  el.textContent = (score < 0 ? '-$' : '$') + Math.abs(score).toLocaleString();
  el.style.color = score < 0 ? '#f87171' : '#f5c518';
}

function renderBoard(cats) {
  const board = document.getElementById('board');
  const cols = cats.length;
  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  board.innerHTML = '';
  cats.forEach(cat => {
    const h = document.createElement('div');
    h.className = 'col-header';
    h.textContent = cat;
    board.appendChild(h);
  });
  VALUES.forEach(val => {
    cats.forEach(cat => {
      const cell = document.createElement('div');
      const key = `${cat}|${val}`;
      cell.className = 'cell' + (usedCells[key] ? ' used' : '');
      cell.dataset.cat = cat;
      cell.dataset.val = val;
      if (!usedCells[key]) {
        cell.textContent = '$' + val;
        cell.onclick = () => openQuestion(cat, val);
      } else {
        cell.textContent = '✓';
      }
      board.appendChild(cell);
    });
  });
  updateProgress();
}

function updateProgress() {
  const used = Object.keys(usedCells).length;
  const pct = totalCells > 0 ? Math.round((used / totalCells) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${used}/${totalCells} answered`;
}

function openQuestion(cat, val) {
  const key = `${cat}|${val}`;
  if (usedCells[key]) return;
  currentCell = { cat, val, key };
  const [q] = gameData[cat][val];
  document.getElementById('m-cat').textContent = cat;
  document.getElementById('m-val').textContent = '$' + val;
  document.getElementById('m-q').textContent = q;
  document.getElementById('m-answer-area').innerHTML = '';
  document.getElementById('m-actions').innerHTML = `
    <button class="modal-btn" onclick="skipQ()">Skip</button>
    <button class="modal-btn show-ans" onclick="showAnswer()">Show answer</button>
  `;
  document.getElementById('modal').classList.remove('hidden');
}

function showAnswer() {
  const { cat, val } = currentCell;
  const [, a] = gameData[cat][val];
  document.getElementById('m-answer-area').innerHTML = `
    <div class="answer-box">
      <div class="answer-label">Answer</div>
      <div class="answer-text">${a}</div>
    </div>
  `;
  document.getElementById('m-actions').innerHTML = `
    <div class="judge-btns">
      <button class="judge-btn wrong" onclick="judgeQ(false)">&#10007; Wrong / Partial</button>
      <button class="judge-btn correct" onclick="judgeQ(true)">&#10003; Got it right</button>
    </div>
  `;
}

function judgeQ(isCorrect) {
  const { cat, val, key } = currentCell;
  usedCells[key] = true;
  if (isCorrect) { score += val; correct++; } else { score -= val; wrong++; }
  updateScoreDisplay();
  document.getElementById('modal').classList.add('hidden');
  markCellUsed(cat, val);
  updateProgress();
  checkGameOver();
}

function skipQ() {
  const { cat, val, key } = currentCell;
  usedCells[key] = true; skipped++;
  document.getElementById('modal').classList.add('hidden');
  markCellUsed(cat, val);
  updateProgress();
  checkGameOver();
}

function markCellUsed(cat, val) {
  document.querySelectorAll('.cell').forEach(c => {
    if (c.dataset.cat === cat && parseInt(c.dataset.val) === val) {
      c.className = 'cell used'; c.textContent = '✓'; c.onclick = null;
    }
  });
}

function checkGameOver() {
  if (Object.keys(usedCells).length >= totalCells) endGame();
}

function endGame() {
  document.getElementById('modal').classList.add('hidden');
  const total = correct + wrong;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById('final-score').textContent = (score<0?'-$':'$')+Math.abs(score).toLocaleString();
  document.getElementById('final-score').style.color = score < 0 ? '#f87171' : '#f5c518';
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-skipped').textContent = skipped;
  document.getElementById('res-pct').textContent = pct + '%';
  const labels = ['Keep studying — you got this!', 'Good start — keep drilling!', 'Getting there!', 'Solid effort!', 'Nice work!', 'Outstanding!'];
  document.getElementById('final-label').textContent = labels[Math.min(Math.floor(pct/20), 5)];
  showScreen('screen-results');
}

function playAgain() {
  selectedCats = [];
  document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
  updateSelInfo();
  showScreen('screen-home');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

init();
</script>
</body>
